<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - SKR INTERNATIONAL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="registerBtn">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARX24b0EnCmh-3WcYfy9wtgj5vpHUNEPQ",
  authDomain: "sherry-project-1214.firebaseapp.com",
  projectId: "sherry-project-1214",
  storageBucket: "sherry-project-1214.firebasestorage.app",
  messagingSenderId: "692003406873",
  appId: "1:692003406873:web:1addf2cb2437cfe1761688"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("registerBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (name === "" || email === "" || password === "") {
    alert("Please fill all fields.");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      name: name,
      email: email,
      balance: 0,
      createdAt: new Date().toISOString()
    });

    alert("Account Created Successfully!");

    window.location.href = "login.html";

  } catch (error) {

    alert(error.code + "\n" + error.message);

  }

});
  </script>

</body>
</html>
